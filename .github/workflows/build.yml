name: Build & Release

# Builds a distributable Windows build of FfxTool.Gui and attaches it to a
# GitHub Release. Runs on version tags (e.g. v1.0.0) or manual dispatch.
#
# Note on why this is simpler than the old Python/PyInstaller build.yml:
# .NET Framework (net48) apps don't need PyInstaller-style bundling — a
# normal `dotnet build` in Release config already produces a runnable
# FfxTool.Gui.exe plus its dependency DLLs and data/plugin_table.json in
# the output folder (copied there via the csproj's CopyToOutputDirectory
# settings). We just zip that folder as-is.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    # windows-latest specifically: has the .NET Framework 4.8 targeting
    # pack pre-installed, required to build net48 projects at all.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FfxTool.sln

      - name: Run tests before packaging
        run: dotnet test FfxTool.sln --configuration Release

      - name: Restore FfxTool.Gui directly
        # Not relying on FfxTool.sln here — if FfxTool.Gui was never
        # actually added as a project entry in the .sln file, restoring
        # the solution silently skips it, which is what caused the
        # NETSDK1004 "assets file not found" error.
        run: dotnet restore FfxTool.Gui\FfxTool.Gui.csproj

      - name: Build (Release)
        run: dotnet build FfxTool.Gui\FfxTool.Gui.csproj --configuration Release --no-restore

      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $outDir = Get-ChildItem -Path "FfxTool.Gui\bin\Release" -Recurse -Filter "FfxTool.Gui.exe" |
            Select-Object -First 1 -ExpandProperty DirectoryName
          if (-not $outDir) { throw "Could not find FfxTool.Gui.exe under FfxTool.Gui\bin\Release" }
          echo "outdir=$outDir" >> $env:GITHUB_OUTPUT

      - name: Zip build output
        shell: pwsh
        run: |
          Compress-Archive -Path "${{ steps.locate.outputs.outdir }}\*" -DestinationPath "FFXCompatibilityTool-windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FFXCompatibilityTool-windows
          path: FFXCompatibilityTool-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FFXCompatibilityTool-windows.zip
          generate_release_notes: true
