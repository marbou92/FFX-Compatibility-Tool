name: Tests (C#)

on:
  push:
  pull_request:

jobs:
  test:
    # windows-latest specifically: it has the .NET Framework 4.8 targeting
    # pack pre-installed, which is required to build net48 projects. A
    # Linux runner would need extra setup for that and still can't run a
    # true Win7-target smoke test.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FfxTool.sln

      - name: Build
        run: dotnet build FfxTool.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FfxTool.sln --configuration Release --no-build --verbosity normal
